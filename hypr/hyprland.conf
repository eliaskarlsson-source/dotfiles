########################################
# Hyprland – Catppuccin Polished
########################################

# --- Monitor ---
monitor = DP-2, 1920x1080@60, 0x0, 1

# --- General ---
general {
  gaps_in = 6
  gaps_out = 8, 20
  border_size = 2
  col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg  # Purple to blue gradient
  col.inactive_border = rgba(45475aff)  # Dark gray
  layout = dwindle
  resize_on_border = true
  allow_tearing = false
}

# --- Decoration ---
decoration {
  rounding = 12
  active_opacity = 1.0
  inactive_opacity = 0.95

  shadow {
    enabled = true
    range = 25
    render_power = 3
    color = rgba(000000aa)
  }

  blur {
    enabled = true
    size = 10
    passes = 3
    noise = 0.02
    contrast = 1.1
    vibrancy = 0.15
    brightness = 1.0
  }

}

# --- Animations ---
animations {
  enabled = true
  
  # Bezier curves
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1
  
  # Animations
  animation = windows, 1, 5, overshot, slide
  animation = windowsOut, 1, 4, smoothOut, slide
  animation = windowsMove, 1, 4, default
  animation = border, 1, 10, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 7, smoothIn
  animation = workspaces, 1, 6, default
  animation = specialWorkspace, 1, 6, smoothOut, slide
}

# --- Input ---
input {
  kb_layout = us, se
  kb_options = grp:alt_shift_toggle
  follow_mouse = 1
  touchpad {
    natural_scroll = true
    disable_while_typing = true
    clickfinger_behavior = true
  }
  sensitivity = 0.0
  accel_profile = flat
}

# --- Keybinds ---
$mainMod = SUPER

# Applications
bind = $mainMod, Return, exec, kitty
bind = $mainMod, E, exec, thunar
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, R, exec, wofi --show run
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, V, togglefloating
bind = $mainMod, M, exit
bind = $mainMod, W, exec, ~/scripts/wallpaper.sh
bind = $mainMod, B, exec, firefox
bind = $mainMod, C, exec, code

# Move focus
bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, UP, movefocus, u
bind = $mainMod, DOWN, movefocus, d

# Move windows
bind = $mainMod SHIFT, LEFT, movewindow, l
bind = $mainMod SHIFT, RIGHT, movewindow, r
bind = $mainMod SHIFT, UP, movewindow, u
bind = $mainMod SHIFT, DOWN, movewindow, d

# Resize windows
bind = $mainMod CTRL, LEFT, resizeactive, -20 0
bind = $mainMod CTRL, RIGHT, resizeactive, 20 0
bind = $mainMod CTRL, UP, resizeactive, 0 -20
bind = $mainMod CTRL, DOWN, resizeactive, 0 20


# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Audio & Media
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,     exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay,        exec, playerctl play-pause
bind = , XF86AudioPause,       exec, playerctl play-pause
bind = , XF86AudioNext,        exec, playerctl next
bind = , XF86AudioPrev,        exec, playerctl previous


# Screenshots
bind = $mainMod, PRINT, exec, grim -g \"$(slurp)\" - | wl-copy
bind = , PRINT, exec, grim - | wl-copy
bind = SHIFT, PRINT, exec, grim -g \"$(slurp)\" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# --- Autostart ---
exec-once = swww-daemon
exec-once = sleep 2 && ~/scripts/wallpaper.sh
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


# --- Dwindle Layout ---
dwindle {
  pseudotile = true
  preserve_split = true
  smart_split = true
  smart_resizing = true
}
